syntax = "proto3";

package netclode.v1;

import "netclode/v1/common.proto";
import "netclode/v1/events.proto";
import "google/protobuf/timestamp.proto";

// ClientService handles communication between clients and the control plane.
// Uses a single bidirectional stream for all operations.
service ClientService {
  // Connect establishes a bidirectional stream for all client-server communication.
  rpc Connect(stream ClientMessage) returns (stream ServerMessage);
}

// ClientMessage is the union of all client-to-server messages.
message ClientMessage {
  oneof message {
    CreateSessionRequest create_session = 1;
    ListSessionsRequest list_sessions = 2;
    OpenSessionRequest open_session = 3;
    ResumeSessionRequest resume_session = 4;
    PauseSessionRequest pause_session = 5;
    DeleteSessionRequest delete_session = 6;
    DeleteAllSessionsRequest delete_all_sessions = 7;
    SendPromptRequest send_prompt = 8;
    InterruptPromptRequest interrupt_prompt = 9;
    TerminalInputRequest terminal_input = 10;
    TerminalResizeRequest terminal_resize = 11;
    ExposePortRequest expose_port = 12;
    SyncRequest sync = 13;
    ListGitHubReposRequest list_github_repos = 14;
    GitStatusRequest git_status = 15;
    GitDiffRequest git_diff = 16;
    ListModelsRequest list_models = 17;
    GetCopilotStatusRequest get_copilot_status = 18;
    // Snapshot operations
    ListSnapshotsRequest list_snapshots = 19;
    RestoreSnapshotRequest restore_snapshot = 20;
    // Repo access update
    UpdateRepoAccessRequest update_repo_access = 21;
    // Resource limits
    GetResourceLimitsRequest get_resource_limits = 22;
    UnexposePortRequest unexpose_port = 23;
  }
}

// ServerMessage is the union of all server-to-client messages.
message ServerMessage {
  oneof message {
    SessionCreatedResponse session_created = 1;
    SessionUpdatedResponse session_updated = 2;
    SessionDeletedResponse session_deleted = 3;
    SessionsDeletedAllResponse sessions_deleted_all = 4;
    SessionListResponse session_list = 5;
    SessionStateResponse session_state = 6;
    SyncResponse sync_response = 7;
    // Unified real-time stream entry (replaces agent_event, agent_message, agent_done, user_message, terminal_output)
    StreamEntryResponse stream_entry = 8;
    // Reserved: 9-12 were agent_message, agent_done, user_message, terminal_output
    PortExposedResponse port_exposed = 13;
    GitHubReposResponse github_repos = 14;
    GitStatusResponse git_status = 15;
    GitDiffResponse git_diff = 16;
    ErrorResponse error = 17;
    ModelsResponse models = 18;
    CopilotStatusResponse copilot_status = 19;
    // Snapshot responses
    SnapshotCreatedResponse snapshot_created = 20;   // Push notification when auto-snapshot is created
    SnapshotListResponse snapshot_list = 21;
    SnapshotRestoredResponse snapshot_restored = 22;
    // Repo access update
    RepoAccessUpdatedResponse repo_access_updated = 23;
    // Resource limits
    ResourceLimitsResponse resource_limits = 24;
    PortUnexposedResponse port_unexposed = 25;
  }
}

// ============================================================================
// Client Request Messages
// ============================================================================

// NetworkConfig controls network access for a session's sandbox.
message NetworkConfig {
  // Whether Tailnet access is enabled for this session.
  // Default: false. When true, sandbox can reach other devices on the
  // Tailscale network (100.64.0.0/10 CGNAT range).
  bool tailnet_access = 1;
}

message CreateSessionRequest {
  optional string request_id = 1;            // Client-generated ID for request correlation
  optional string name = 2;                  // Initial session name
  repeated string repos = 3;                 // GitHub repositories to clone (e.g., "owner/repo")
  optional RepoAccess repo_access = 4;       // Permission level for repository
  optional string initial_prompt = 5;        // Optional prompt to send immediately after creation
  optional SdkType sdk_type = 6;             // SDK to use (defaults to CLAUDE)
  optional string model = 7;                 // Model ID (e.g., "claude-sonnet-4-0", "gpt-4o")
  optional CopilotBackend copilot_backend = 8;  // Backend for Copilot SDK (GitHub or Anthropic)
  optional NetworkConfig network_config = 9;   // Network configuration (defaults to enabled)
  optional SandboxResources resources = 10;    // Custom VM resources (bypasses warm pool if set)
}

message ListSessionsRequest {
  optional string request_id = 1;
}

message OpenSessionRequest {
  optional string request_id = 1;
  string session_id = 2;
  optional string after_stream_id = 3;       // Cursor: return entries after this stream ID
  optional int32 limit = 4;                  // Max entries to return (default: all)
}

message ResumeSessionRequest {
  optional string request_id = 1;
  string session_id = 2;
}

message PauseSessionRequest {
  optional string request_id = 1;
  string session_id = 2;
}

message DeleteSessionRequest {
  optional string request_id = 1;
  string session_id = 2;
}

message DeleteAllSessionsRequest {
  optional string request_id = 1;
}

message SendPromptRequest {
  optional string request_id = 1;
  string session_id = 2;
  string text = 3;
  optional string model = 4;
}

message InterruptPromptRequest {
  optional string request_id = 1;
  string session_id = 2;
}

message TerminalInputRequest {
  optional string request_id = 1;
  string session_id = 2;
  string data = 3;
}

message TerminalResizeRequest {
  optional string request_id = 1;
  string session_id = 2;
  int32 cols = 3;
  int32 rows = 4;
}

message ExposePortRequest {
  optional string request_id = 1;
  string session_id = 2;
  int32 port = 3;
}

message UnexposePortRequest {
  optional string request_id = 1;
  string session_id = 2;
  int32 port = 3;
}

message SyncRequest {
  optional string request_id = 1;
}

message ListGitHubReposRequest {
  optional string request_id = 1;
}

message GitStatusRequest {
  optional string request_id = 1;
  string session_id = 2;
}

message GitDiffRequest {
  optional string request_id = 1;
  string session_id = 2;
  optional string file = 3;                  // Specific file path, or all files if empty
}

message ListModelsRequest {
  optional string request_id = 1;
  SdkType sdk_type = 2;                      // Which SDK to list models for
  optional CopilotBackend copilot_backend = 3;  // For Copilot: which backend's models to list
}

message GetCopilotStatusRequest {
  optional string request_id = 1;
}

message ListSnapshotsRequest {
  optional string request_id = 1;
  string session_id = 2;
}

message RestoreSnapshotRequest {
  optional string request_id = 1;
  string session_id = 2;
  string snapshot_id = 3;
}

message UpdateRepoAccessRequest {
  optional string request_id = 1;
  string session_id = 2;
  RepoAccess repo_access = 3;              // New access level
}

message GetResourceLimitsRequest {
  optional string request_id = 1;
}

// ============================================================================
// Server Response Messages
// ============================================================================

message SessionCreatedResponse {
  Session session = 1;
  optional string request_id = 2;            // Echoed from request for correlation
}

message SessionUpdatedResponse {
  Session session = 1;
}

message SessionDeletedResponse {
  string session_id = 1;
  optional string request_id = 2;
}

message SessionsDeletedAllResponse {
  repeated string deleted_ids = 1;
  optional string request_id = 2;
}

message SessionListResponse {
  repeated Session sessions = 1;
  optional string request_id = 2;
}

message SessionStateResponse {
  Session session = 1;
  repeated StreamEntry entries = 2;          // History: partial=false entries only
  bool has_more = 3;                         // true if more entries available for pagination
  optional string last_stream_id = 4;        // Cursor for subscribing to real-time updates
  optional InProgressState in_progress = 5;  // Accumulated streaming state if RUNNING
  optional string request_id = 6;
}

message SyncResponse {
  repeated SessionSummary sessions = 1;
  google.protobuf.Timestamp server_time = 2;
  optional string request_id = 3;
}

// StreamEntryResponse wraps a StreamEntry for real-time push notifications.
// This is the unified type for all session stream updates (messages, events, terminal output, etc.)
message StreamEntryResponse {
  string session_id = 1;
  StreamEntry entry = 2;
}

message PortExposedResponse {
  string session_id = 1;
  int32 port = 2;
  string preview_url = 3;
  optional string request_id = 4;
}

message PortUnexposedResponse {
  string session_id = 1;
  int32 port = 2;
  optional string request_id = 3;
}

message GitHubReposResponse {
  repeated GitHubRepo repos = 1;
  optional string request_id = 2;
}

message GitStatusResponse {
  string session_id = 1;
  repeated GitFileChange files = 2;
  optional string request_id = 3;
}

message GitDiffResponse {
  string session_id = 1;
  string diff = 2;
  optional string request_id = 3;
}

// ErrorResponse is the unified error type for all error conditions.
// Replaces SessionErrorResponse, AgentErrorResponse, PortErrorResponse, GitErrorResponse.
message ErrorResponse {
  Error error = 1;                           // Structured error details
  optional string request_id = 2;            // Echoed from request for correlation
}

message ModelsResponse {
  repeated ModelInfo models = 1;             // Available models for the requested SDK
  optional string request_id = 2;
  optional SdkType sdk_type = 3;             // Which SDK these models are for
}

message CopilotStatusResponse {
  CopilotAuthStatus auth = 1;                // GitHub Copilot authentication status
  optional CopilotPremiumQuota quota = 2;    // Premium request quota (only if authenticated)
  optional string request_id = 3;
}

// ============================================================================
// Snapshot Response Messages
// ============================================================================

// SnapshotCreatedResponse is pushed to clients when an auto-snapshot is created after a turn.
message SnapshotCreatedResponse {
  string session_id = 1;
  Snapshot snapshot = 2;
}

message SnapshotListResponse {
  string session_id = 1;
  repeated Snapshot snapshots = 2;           // Ordered newest first
  optional string request_id = 3;
}

// SnapshotRestoredResponse is sent after workspace and messages are restored.
message SnapshotRestoredResponse {
  string session_id = 1;
  string snapshot_id = 2;
  int32 messages_restored = 3;               // Number of messages after restore
  optional string request_id = 4;
}

// RepoAccessUpdatedResponse is sent after repo access level is updated.
message RepoAccessUpdatedResponse {
  string session_id = 1;
  RepoAccess repo_access = 2;                // New access level that was set
  optional string request_id = 3;
}

// ResourceLimitsResponse contains the maximum sandbox resource allocation.
// Values are the maximum allowed per session (50% of host resources).
message ResourceLimitsResponse {
  int32 max_vcpus = 1;                       // Maximum vCPUs per session
  int32 max_memory_mb = 2;                   // Maximum memory in MiB per session
  int32 default_vcpus = 3;                   // Default vCPUs (warm pool configuration)
  int32 default_memory_mb = 4;               // Default memory in MiB (warm pool configuration)
  optional string request_id = 5;
}
