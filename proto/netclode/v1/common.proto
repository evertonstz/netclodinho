syntax = "proto3";

package netclode.v1;

import "google/protobuf/timestamp.proto";
import "netclode/v1/events.proto";

// ============================================================================
// Enums
// ============================================================================

// RepoAccess defines the permission level for repository operations.
enum RepoAccess {
  REPO_ACCESS_UNSPECIFIED = 0;
  REPO_ACCESS_READ = 1;          // Clone only (no push)
  REPO_ACCESS_WRITE = 2;         // Clone and push (to selected repo only)
}

// SdkType defines which agent SDK to use for the session.
enum SdkType {
  SDK_TYPE_UNSPECIFIED = 0;
  SDK_TYPE_CLAUDE = 1;           // Anthropic Claude Code SDK
  SDK_TYPE_OPENCODE = 2;         // OpenCode SDK (multi-provider)
  SDK_TYPE_COPILOT = 3;          // GitHub Copilot SDK
  SDK_TYPE_CODEX = 4;            // OpenAI Codex SDK
}

// CopilotBackend defines which backend to use for Copilot SDK sessions.
enum CopilotBackend {
  COPILOT_BACKEND_UNSPECIFIED = 0;
  COPILOT_BACKEND_GITHUB = 1;    // GitHub Copilot API
  COPILOT_BACKEND_ANTHROPIC = 2; // Anthropic API (BYOK mode)
}

// SessionStatus represents the lifecycle state of a session.
enum SessionStatus {
  SESSION_STATUS_UNSPECIFIED = 0;
  SESSION_STATUS_CREATING = 1;
  SESSION_STATUS_RESUMING = 2;
  SESSION_STATUS_READY = 3;
  SESSION_STATUS_RUNNING = 4;
  SESSION_STATUS_PAUSED = 5;
  SESSION_STATUS_ERROR = 6;
  SESSION_STATUS_INTERRUPTED = 7;
}

// GitFileStatus represents the type of change to a file.
enum GitFileStatus {
  GIT_FILE_STATUS_UNSPECIFIED = 0;
  GIT_FILE_STATUS_MODIFIED = 1;
  GIT_FILE_STATUS_ADDED = 2;
  GIT_FILE_STATUS_DELETED = 3;
  GIT_FILE_STATUS_RENAMED = 4;
  GIT_FILE_STATUS_UNTRACKED = 5;
  GIT_FILE_STATUS_COPIED = 6;
  GIT_FILE_STATUS_IGNORED = 7;
  GIT_FILE_STATUS_UNMERGED = 8;
}

// ============================================================================
// Session
// ============================================================================

// Session represents a coding session with an AI agent.
message Session {
  string id = 1;
  string name = 2;
  SessionStatus status = 3;
  optional string repo = 4;
  optional RepoAccess repo_access = 5;
  google.protobuf.Timestamp created_at = 6;
  google.protobuf.Timestamp last_active_at = 7;
  optional SdkType sdk_type = 8;
  optional string model = 9;
  optional CopilotBackend copilot_backend = 10;
}

// SessionSummary includes session data plus metadata for list views.
message SessionSummary {
  Session session = 1;
  optional int32 message_count = 2;
  optional string last_stream_id = 3;        // Cursor for resuming
}

// SessionConfig contains configuration passed to the agent on registration.
message SessionConfig {
  string session_id = 1;
  string workspace_dir = 2;
  optional string github_token = 3;
  optional string repo = 4;
  optional RepoAccess repo_access = 5;
  string control_plane_url = 6;
  optional SdkType sdk_type = 7;
  optional string model = 8;
  optional CopilotBackend copilot_backend = 9;
  optional string github_copilot_token = 10;
  optional string codex_access_token = 11;
  optional string codex_id_token = 12;
  optional string openai_api_key = 13;
  optional string codex_refresh_token = 14;
  optional string reasoning_effort = 15;
  optional string mistral_api_key = 16;
}

// ============================================================================
// Stream Entry (Unified)
// ============================================================================

// StreamEntry represents a single entry in the unified session stream.
// All content flows through this type - messages, events, terminal output, etc.
message StreamEntry {
  string id = 1;                             // Redis Stream ID
  google.protobuf.Timestamp timestamp = 2;
  bool partial = 3;                          // true = streaming delta, false = final

  oneof payload {
    AgentEvent event = 4;                    // All agent content (messages, thinking, tools)
    TerminalOutput terminal_output = 5;      // Terminal data
    Session session_update = 6;              // Status changes
    Error error = 7;
  }
}

// TerminalOutput represents terminal output data.
message TerminalOutput {
  string data = 1;
}

// Error represents a structured error response.
message Error {
  string code = 1;
  string message = 2;
  optional string session_id = 3;
  map<string, string> details = 4;
}

// ============================================================================
// In-Progress State (for session open)
// ============================================================================

// InProgressState contains accumulated streaming state for late-joining clients.
// Returned when opening a session that's currently RUNNING.
message InProgressState {
  map<string, string> messages = 1;          // correlation_id -> accumulated text
  map<string, string> thinking = 2;          // correlation_id -> accumulated thinking
  map<string, InProgressTool> tools = 3;     // correlation_id -> tool state
}

// InProgressTool contains accumulated state for a tool in progress.
message InProgressTool {
  string tool = 1;                           // Tool name
  string input = 2;                          // Accumulated input
  string output = 3;                         // Accumulated output
}

// ============================================================================
// Snapshots
// ============================================================================

// Snapshot represents a point-in-time snapshot of session workspace and conversation.
message Snapshot {
  string id = 1;
  string session_id = 2;
  string name = 3;
  google.protobuf.Timestamp created_at = 4;
  int64 size_bytes = 5;
  int32 turn_number = 6;
  int32 message_count = 7;
  string stream_id = 8;                      // Redis Stream cursor at snapshot time
}

// ============================================================================
// GitHub
// ============================================================================

// GitHubRepo represents a GitHub repository from the user's account.
message GitHubRepo {
  string name = 1;
  string full_name = 2;
  bool private = 3;
  optional string description = 4;
}

// GitFileChange represents a changed file from git status.
message GitFileChange {
  string path = 1;
  GitFileStatus status = 2;
  bool staged = 3;
  optional int32 lines_added = 4;
  optional int32 lines_removed = 5;
}

// ============================================================================
// Models
// ============================================================================

// ModelInfo represents an AI model available for use.
message ModelInfo {
  string id = 1;
  string name = 2;
  optional string provider = 3;
  optional double billing_multiplier = 4;
  repeated string capabilities = 5;
  optional string reasoning_effort = 6;
}

// CopilotAuthStatus represents GitHub Copilot authentication state.
message CopilotAuthStatus {
  bool is_authenticated = 1;
  optional string auth_type = 2;
  optional string login = 3;
}

// CopilotPremiumQuota represents GitHub Copilot premium request quota.
message CopilotPremiumQuota {
  int32 used = 1;
  int32 limit = 2;
  int32 remaining = 3;
  optional string reset_at = 4;
}

// SandboxResources defines resource allocation for a session's sandbox VM.
message SandboxResources {
  int32 vcpus = 1;
  int32 memory_mb = 2;
}
