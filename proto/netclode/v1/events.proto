syntax = "proto3";

package netclode.v1;

import "google/protobuf/struct.proto";

// AgentEventKind identifies the type of event.
enum AgentEventKind {
  AGENT_EVENT_KIND_UNSPECIFIED = 0;
  
  // Content events (use partial flag on StreamEntry)
  AGENT_EVENT_KIND_MESSAGE = 1;               // User or assistant message
  AGENT_EVENT_KIND_THINKING = 2;              // Agent thinking/reasoning content
  
  // Tool lifecycle
  AGENT_EVENT_KIND_TOOL_START = 3;            // Tool invocation started
  AGENT_EVENT_KIND_TOOL_INPUT = 4;            // Tool input (partial=true for streaming)
  AGENT_EVENT_KIND_TOOL_OUTPUT = 5;           // Tool output (partial=true for streaming)
  AGENT_EVENT_KIND_TOOL_END = 6;              // Tool execution completed
  
  // System events
  AGENT_EVENT_KIND_PORT_EXPOSED = 7;          // Port was exposed for preview
  AGENT_EVENT_KIND_REPO_CLONE = 8;            // Repository clone progress
  AGENT_EVENT_KIND_AGENT_DISCONNECTED = 9;    // Agent disconnected unexpectedly
  AGENT_EVENT_KIND_AGENT_RECONNECTED = 10;    // Agent reconnected after disconnect
}

// AgentEvent represents events emitted during agent execution.
message AgentEvent {
  AgentEventKind kind = 1;
  string correlation_id = 2;                  // Groups related events (message_id, thinking_id, tool_use_id)

  // Event-specific payload
  oneof payload {
    MessagePayload message = 3;
    ThinkingPayload thinking = 4;
    ToolStartPayload tool_start = 5;
    ToolInputPayload tool_input = 6;
    ToolOutputPayload tool_output = 7;
    ToolEndPayload tool_end = 8;
    PortExposedPayload port_exposed = 9;
    RepoClonePayload repo_clone = 10;
  }
}

// MessagePayload contains data for user/assistant messages.
message MessagePayload {
  MessageRole role = 1;                       // USER or ASSISTANT
  string content = 2;                         // Delta if partial=true, full if partial=false
}

// MessageRole identifies the sender of a message.
enum MessageRole {
  MESSAGE_ROLE_UNSPECIFIED = 0;
  MESSAGE_ROLE_USER = 1;
  MESSAGE_ROLE_ASSISTANT = 2;
}

// ThinkingPayload contains data for agent thinking/reasoning events.
message ThinkingPayload {
  string content = 1;                         // Delta if partial=true, full if partial=false
  bool partial = 2;                           // True for streaming deltas, false for final complete content
}

// ToolStartPayload contains data for tool invocation start.
message ToolStartPayload {
  string tool = 1;                            // Tool name (e.g., "Read", "Edit", "Bash")
  optional string parent_tool_use_id = 2;     // Set when tool runs inside a Task/subagent
}

// ToolInputPayload contains data for tool input (streaming or complete).
message ToolInputPayload {
  // For partial=true: delta contains the streaming chunk
  // For partial=false: input contains the full input
  optional string delta = 1;                  // Streaming input delta
  optional google.protobuf.Struct input = 2;  // Full tool input (when partial=false)
}

// ToolOutputPayload contains data for tool output (streaming or complete).
message ToolOutputPayload {
  // For partial=true: delta contains the streaming chunk
  // For partial=false: output contains the full output
  optional string delta = 1;                  // Streaming output delta
  optional string output = 2;                 // Full tool output (when partial=false)
}

// ToolEndPayload contains data for tool execution completion.
message ToolEndPayload {
  bool success = 1;                           // Whether tool succeeded
  optional string error = 2;                  // Error message if failed
  optional int64 duration_ms = 3;             // Duration in milliseconds
}

// PortExposedPayload contains data for port exposure events.
message PortExposedPayload {
  int32 port = 1;                             // The port number exposed
  optional string process = 2;                // Process name listening on the port
  optional string preview_url = 3;            // URL to access the exposed port
}

// RepoCloneStage represents the stage of repository cloning.
enum RepoCloneStage {
  REPO_CLONE_STAGE_UNSPECIFIED = 0;
  REPO_CLONE_STAGE_STARTING = 1;              // Clone operation is starting
  REPO_CLONE_STAGE_CLONING = 2;               // Clone is in progress
  REPO_CLONE_STAGE_DONE = 3;                  // Clone completed successfully
  REPO_CLONE_STAGE_ERROR = 4;                 // Clone failed with an error
}

// RepoClonePayload contains data for repository clone progress events.
message RepoClonePayload {
  string repo = 1;                            // Repository URL being cloned
  RepoCloneStage stage = 2;                   // Current stage of the clone operation
  string message = 3;                         // Human-readable progress message
}
