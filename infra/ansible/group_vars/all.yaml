---
# Netclode Ansible Configuration
# ================================

# System
timezone: UTC
locale: en_US.UTF-8
netclode_hostname: "{{ lookup('env', 'DEPLOY_HOST') }}"

# SSH authorized keys for root (loaded from /var/secrets/ssh-authorized-keys)
# Deploy via: ansible-playbook playbooks/secrets.yaml
# Set SSH_AUTHORIZED_KEYS in .env file

# Packages
common_packages:
  - curl
  - wget
  - git
  - htop
  - vim
  - jq
  - tmux
  - ncdu
  - gnupg
  - apt-transport-https
  - ca-certificates
  - python3-pip
  - python3-kubernetes

# Kernel modules for virtualization
kernel_modules:
  - kvm_intel
  - kvm_amd
  - vhost_net
  - vhost_vsock
  - tun
  - tap

# Directories to create
system_directories:
  - path: /var/lib/netclode
    mode: "0750"
  - path: /var/secrets
    mode: "0700"
  - path: /opt/netclode
    mode: "0755"

# Network
external_interface: eth0
pod_network: 10.42.0.0/16
service_network: 10.43.0.0/16
cni_interface: cni0

# Firewall ports
firewall_tcp_ports:
  - 22  # SSH

firewall_tailscale_tcp_ports:
  - 6443  # k3s API

# k3s
k3s_version: ""  # Empty means latest stable
k3s_kubeconfig: /etc/rancher/k3s/k3s.yaml
k3s_extra_flags:
  - "--disable=traefik"
  - "--disable=servicelb"
  - "--flannel-backend=none"
  - "--disable-network-policy"
  - "--tls-san={{ netclode_hostname }}"

# Cilium CNI
cilium_version: "1.17.0"

# Kata Containers
kata_version: "3.24.0"
kata_dir: /opt/kata

# JuiceFS CSI (Redis runs in k8s, not on host)
juicefs_csi_version: "v0.31.0"

# Tailscale
tailscale_port: 41641

# NVIDIA GPU support (optional)
# Set NVIDIA_ENABLED=true in .env to install NVIDIA drivers and container toolkit
nvidia_enabled: "{{ lookup('env', 'NVIDIA_ENABLED') | default('false', true) | lower == 'true' }}"

# Ollama local inference (optional)
# Set OLLAMA_ENABLED=true in .env to deploy Ollama with GPU support
ollama_enabled: "{{ lookup('env', 'OLLAMA_ENABLED') | default('false', true) | lower == 'true' }}"

# Datadog monitoring (optional)
# Set DD_API_KEY in .env to deploy Datadog Agent
dd_api_key: "{{ lookup('env', 'DD_API_KEY') | default('', true) }}"
dd_app_key: "{{ lookup('env', 'DD_APP_KEY') | default('', true) }}"
dd_site: "{{ lookup('env', 'DD_SITE') | default('datadoghq.com', true) }}"
dd_version: "{{ lookup('env', 'DD_VERSION') | default('latest', true) }}"
dd_git_commit_sha: "{{ lookup('env', 'DD_GIT_COMMIT_SHA') | default('latest', true) }}"
