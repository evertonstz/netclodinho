---
# Fetch kubeconfig from remote server for local kubectl access
#
# Usage:
#   ansible-playbook playbooks/fetch-kubeconfig.yaml
#
# This creates ~/.kube/netclode.yaml with context "netclode"

- name: Fetch kubeconfig
  hosts: all
  become: yes
  gather_facts: no
  vars_files:
    - ../group_vars/all.yaml

  tasks:
    - name: Read remote kubeconfig
      ansible.builtin.slurp:
        src: "{{ k3s_kubeconfig }}"
      register: remote_kubeconfig

    - name: Ensure ~/.kube directory exists
      ansible.builtin.file:
        path: "{{ lookup('env', 'HOME') }}/.kube"
        state: directory
        mode: "0700"
      delegate_to: localhost
      become: no

    - name: Write local kubeconfig with updated server URL
      ansible.builtin.template:
        src: ../templates/kubeconfig.yaml.j2
        dest: "{{ lookup('env', 'HOME') }}/.kube/netclode.yaml"
        mode: "0600"
      delegate_to: localhost
      become: no
      vars:
        kubeconfig: "{{ remote_kubeconfig.content | b64decode | from_yaml }}"
        server_url: "https://{{ netclode_hostname }}:6443"

    - name: Display usage instructions
      ansible.builtin.debug:
        msg: |
          Kubeconfig saved to ~/.kube/netclode.yaml
          
          Usage:
            export KUBECONFIG=~/.kube/netclode.yaml
            kubectl get nodes
          
          Or merge with existing config:
            export KUBECONFIG=~/.kube/config:~/.kube/netclode.yaml
            kubectl config view --flatten > ~/.kube/config.merged
            mv ~/.kube/config.merged ~/.kube/config
            kubectl config use-context netclode
