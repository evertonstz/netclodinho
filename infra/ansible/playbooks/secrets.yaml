---
# Deploy secrets to the host and Kubernetes
# Reads from .env file and deploys to /var/secrets/ and k8s secrets
#
# Usage:
#   ENV_FILE=/path/to/.env ansible-playbook playbooks/secrets.yaml
#
# Required in .env:
#   ANTHROPIC_API_KEY=sk-ant-...
#   SSH_AUTHORIZED_KEYS=ssh-ed25519 AAAA... user@host
#   TS_OAUTH_CLIENT_ID=...
#   TS_OAUTH_CLIENT_SECRET=...
#   DO_SPACES_ACCESS_KEY=...
#   DO_SPACES_SECRET_KEY=...
#   JUICEFS_BUCKET=https://...
#   JUICEFS_META_URL=redis://...
#
# Optional in .env:
#   TAILSCALE_AUTHKEY=tskey-auth-xxx  (consumed on first use)
#
# Note: K8s secrets require the netclode namespace to exist.
#       Run site.yaml first, or this will only deploy host secrets.

- name: Deploy secrets
  hosts: all
  become: yes
  gather_facts: no
  vars_files:
    - ../group_vars/all.yaml

  pre_tasks:
    - name: Check if netclode namespace exists
      kubernetes.core.k8s_info:
        api_version: v1
        kind: Namespace
        name: netclode
        kubeconfig: "{{ k3s_kubeconfig }}"
      register: netclode_ns
      failed_when: false

    - name: Set deploy_k8s_secrets based on namespace existence
      ansible.builtin.set_fact:
        deploy_k8s_secrets: "{{ netclode_ns.resources | default([]) | length > 0 }}"

  roles:
    - role: deploy-secrets
