---
# Kata Containers role - Cloud Hypervisor runtime
# Ported from Kata installation in NixOS modules/k3s.nix

- name: Check if Kata is installed
  ansible.builtin.stat:
    path: "{{ kata_dir }}/bin/kata-runtime"
  register: kata_binary

- name: Check installed Kata version
  ansible.builtin.slurp:
    src: "{{ kata_dir }}/.version"
  register: kata_installed_version
  when: kata_binary.stat.exists
  failed_when: false

- name: Set kata_needs_install fact
  ansible.builtin.set_fact:
    kata_needs_install: "{{ not kata_binary.stat.exists or (kata_installed_version.content | default('') | b64decode | trim) != kata_version }}"

- name: Install zstd for decompression
  ansible.builtin.apt:
    name: zstd
    state: present
  when: kata_needs_install

- name: Download Kata static release
  ansible.builtin.get_url:
    url: "https://github.com/kata-containers/kata-containers/releases/download/{{ kata_version }}/kata-static-{{ kata_version }}-amd64.tar.zst"
    dest: /tmp/kata-static.tar.zst
    mode: "0644"
  when: kata_needs_install

- name: Extract Kata static release
  ansible.builtin.shell: |
    zstd -d -c /tmp/kata-static.tar.zst | tar -xf - -C /
  when: kata_needs_install

- name: Write Kata version file
  ansible.builtin.copy:
    content: "{{ kata_version }}"
    dest: "{{ kata_dir }}/.version"
    mode: "0644"
  when: kata_needs_install

- name: Create /usr/local/bin directory
  ansible.builtin.file:
    path: /usr/local/bin
    state: directory
    mode: "0755"

- name: Create Kata shim symlinks in /usr/local/bin
  ansible.builtin.file:
    src: "{{ kata_dir }}/bin/containerd-shim-kata-v2"
    dest: "/usr/local/bin/{{ item }}"
    state: link
    force: yes
  loop:
    - containerd-shim-kata-v2
    - containerd-shim-kata-clh-v2

- name: Create Kata shim symlinks in k3s bin directories
  ansible.builtin.shell: |
    for k3s_bin in /var/lib/rancher/k3s/data/*/bin; do
      if [ -d "$k3s_bin" ]; then
        ln -sf {{ kata_dir }}/bin/containerd-shim-kata-v2 "$k3s_bin/containerd-shim-kata-v2"
        ln -sf {{ kata_dir }}/bin/containerd-shim-kata-v2 "$k3s_bin/containerd-shim-kata-clh-v2"
      fi
    done
  changed_when: false

- name: Clean up downloaded archive
  ansible.builtin.file:
    path: /tmp/kata-static.tar.zst
    state: absent
  when: kata_needs_install

- name: Configure Kata VM memory
  ansible.builtin.lineinfile:
    path: "{{ kata_dir }}/share/defaults/kata-containers/configuration-clh.toml"
    regexp: '^default_memory\s*='
    line: 'default_memory = {{ kata_vm_memory_mb }}'

- name: Configure Kata VM CPUs
  ansible.builtin.lineinfile:
    path: "{{ kata_dir }}/share/defaults/kata-containers/configuration-clh.toml"
    regexp: '^default_vcpus\s*='
    line: 'default_vcpus = {{ kata_vm_cpus }}'

# virtiofs cache mode - "always" caches metadata, data, and pathname lookup
# in guest permanently, improving IOPS by ~60% compared to "auto"
# Note: DAX (virtio_fs_cache_size > 0) is not supported with Cloud Hypervisor
- name: Configure virtiofs cache mode
  ansible.builtin.lineinfile:
    path: "{{ kata_dir }}/share/defaults/kata-containers/configuration-clh.toml"
    regexp: '^virtio_fs_cache\s*='
    line: 'virtio_fs_cache = "always"'

# Memory optimization settings
# virtio-mem allows dynamic memory resize - VMs can grow/shrink based on actual
# memory pressure rather than allocating full default_memory upfront.
# This improves host memory utilization when running many sandboxes.
- name: Configure virtio-mem for dynamic memory
  ansible.builtin.lineinfile:
    path: "{{ kata_dir }}/share/defaults/kata-containers/configuration-clh.toml"
    regexp: '^enable_virtio_mem\s*='
    line: 'enable_virtio_mem = {{ kata_enable_virtio_mem | lower }}'

# Memory reclaim uses the virtio-balloon device to return unused guest memory
# back to the host. When containers free memory, the balloon inflates to
# reclaim those pages for other VMs or host processes.
- name: Configure memory reclaim via balloon
  ansible.builtin.lineinfile:
    path: "{{ kata_dir }}/share/defaults/kata-containers/configuration-clh.toml"
    regexp: '^reclaim_guest_freed_memory\s*='
    line: 'reclaim_guest_freed_memory = {{ kata_reclaim_guest_freed_memory | lower }}'

# virtio-mem requires memory overcommit to be enabled on the host.
# This allows the kernel to promise more memory than physically available,
# which is safe when VMs don't actually use their full allocation.
- name: Enable memory overcommit for virtio-mem
  ansible.posix.sysctl:
    name: vm.overcommit_memory
    value: "1"
    state: present
    sysctl_file: /etc/sysctl.d/99-kata-memory.conf
    reload: yes
  when: kata_enable_virtio_mem

# Security hardening settings
# Rootless mode runs Cloud Hypervisor as a non-root user.
# If the VMM is compromised, the attacker only has unprivileged access.
- name: Configure rootless mode
  ansible.builtin.lineinfile:
    path: "{{ kata_dir }}/share/defaults/kata-containers/configuration-clh.toml"
    regexp: '^rootless\s*='
    line: 'rootless = {{ kata_rootless | lower }}'

# Guest seccomp applies container seccomp profiles inside the VM.
# This provides defense in depth - even if an attacker escapes the container
# namespace, they're still constrained by seccomp inside the VM.
- name: Configure guest seccomp
  ansible.builtin.lineinfile:
    path: "{{ kata_dir }}/share/defaults/kata-containers/configuration-clh.toml"
    regexp: '^disable_guest_seccomp\s*='
    line: 'disable_guest_seccomp = {{ (not kata_enable_guest_seccomp) | lower }}'

# Cgroup management
# When true, all Kata processes (VMM, vhost, virtiofsd) run in the pod cgroup.
# This requires RuntimeClass overhead to be configured so the pod cgroup is
# properly sized. Enables accurate resource accounting and prevents noisy neighbors.
- name: Configure sandbox_cgroup_only
  ansible.builtin.lineinfile:
    path: "{{ kata_dir }}/share/defaults/kata-containers/configuration-clh.toml"
    regexp: '^sandbox_cgroup_only\s*='
    line: 'sandbox_cgroup_only = true'

# virtiofs performance tuning
# Higher queue size allows more in-flight I/O requests, improving throughput
# for parallel workloads like npm install, git operations, builds.
- name: Configure virtiofs queue size
  ansible.builtin.lineinfile:
    path: "{{ kata_dir }}/share/defaults/kata-containers/configuration-clh.toml"
    regexp: '^virtio_fs_queue_size\s*='
    line: 'virtio_fs_queue_size = {{ kata_virtio_fs_queue_size }}'

# More virtiofsd threads allow better handling of concurrent I/O requests.
- name: Configure virtiofs thread pool size
  ansible.builtin.lineinfile:
    path: "{{ kata_dir }}/share/defaults/kata-containers/configuration-clh.toml"
    regexp: '^virtio_fs_extra_args\s*='
    line: 'virtio_fs_extra_args = ["--thread-pool-size={{ kata_virtio_fs_thread_pool_size }}", "--announce-submounts"]'

# Enable per-pod resource annotations
# This allows individual pods to override default_vcpus and default_memory
# via annotations like io.katacontainers.config.hypervisor.default_vcpus
- name: Enable hypervisor annotations for per-pod resource configuration
  ansible.builtin.lineinfile:
    path: "{{ kata_dir }}/share/defaults/kata-containers/configuration-clh.toml"
    regexp: '^enable_annotations\s*='
    line: 'enable_annotations = ["default_vcpus", "default_memory"]'

