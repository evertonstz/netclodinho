---
# Datadog Operator + DatadogAgent CR
# Only deploys if DD_API_KEY is set in .env
#
# Two-step setup:
# 1. Install Datadog Operator via Helm (manages CRDs + controller)
# 2. Create DatadogAgent CR (Operator reconciles into DaemonSet + Cluster Agent)
#
# The Operator automatically upgrades the Agent to new patch/minor versions.

- name: Skip Datadog if API key not configured
  ansible.builtin.debug:
    msg: "DD_API_KEY not set, skipping Datadog deployment"
  when: dd_api_key | default('') | length == 0

- name: Deploy Datadog
  when: dd_api_key | default('') | length > 0
  block:
    - name: Add Datadog Helm repo
      kubernetes.core.helm_repository:
        name: datadog
        repo_url: https://helm.datadoghq.com
        kubeconfig: "{{ k3s_kubeconfig }}"

    - name: Create datadog namespace
      kubernetes.core.k8s:
        state: present
        kubeconfig: "{{ k3s_kubeconfig }}"
        definition:
          apiVersion: v1
          kind: Namespace
          metadata:
            name: datadog

    - name: Create Datadog API key secret
      kubernetes.core.k8s:
        state: present
        kubeconfig: "{{ k3s_kubeconfig }}"
        definition:
          apiVersion: v1
          kind: Secret
          metadata:
            name: datadog-secret
            namespace: datadog
          type: Opaque
          stringData:
            api-key: "{{ dd_api_key }}"
            app-key: "{{ dd_app_key }}"

    # Step 1: Install the Datadog Operator (includes CRDs)
    - name: Install Datadog Operator via Helm
      kubernetes.core.helm:
        name: datadog-operator
        chart_ref: datadog/datadog-operator
        release_namespace: datadog
        create_namespace: false
        kubeconfig: "{{ k3s_kubeconfig }}"
        values:
          watchNamespaces:
            - datadog
        wait: true
        wait_timeout: "300s"

    # Step 2: Create the DatadogAgent CR (Operator reconciles into DaemonSet + Cluster Agent)
    - name: Deploy DatadogAgent CR
      kubernetes.core.k8s:
        state: present
        kubeconfig: "{{ k3s_kubeconfig }}"
        definition: "{{ lookup('template', 'datadog-agent.yaml.j2') | from_yaml }}"
