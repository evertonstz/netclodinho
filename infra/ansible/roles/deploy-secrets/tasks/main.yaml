---
# Secrets role - Deploy secrets to host and Kubernetes
# Automatically reads .env file from repo root

- name: Set .env file path (defaults to repo root)
  ansible.builtin.set_fact:
    env_file: "{{ (playbook_dir + '/../../..') | realpath }}/.env"

- name: Check if .env file exists
  ansible.builtin.stat:
    path: "{{ env_file }}"
  delegate_to: localhost
  become: no
  register: env_file_stat

- name: Skip secrets if .env file not found
  ansible.builtin.debug:
    msg: "No .env file found at {{ env_file }}, skipping secrets deployment."
  when: not env_file_stat.stat.exists

- name: Read and parse .env file
  when: env_file_stat.stat.exists
  block:
    - name: Read .env file content
      ansible.builtin.set_fact:
        env_content_raw: "{{ lookup('file', env_file) }}"
      delegate_to: localhost
      become: no

    - name: Extract secrets from .env
      ansible.builtin.set_fact:
        ssh_keys: "{{ (env_content_raw | regex_search('(?m)^SSH_AUTHORIZED_KEYS=(.*)$', '\\1') or [''])[0] }}"
        ts_oauth_client_id: "{{ (env_content_raw | regex_search('(?m)^TS_OAUTH_CLIENT_ID=(.*)$', '\\1') or [''])[0] }}"
        ts_oauth_client_secret: "{{ (env_content_raw | regex_search('(?m)^TS_OAUTH_CLIENT_SECRET=(.*)$', '\\1') or [''])[0] }}"
        tailscale_authkey: "{{ (env_content_raw | regex_search('(?m)^TAILSCALE_AUTHKEY=(.*)$', '\\1') or [''])[0] }}"
        anthropic_api_key: "{{ (env_content_raw | regex_search('(?m)^ANTHROPIC_API_KEY=(.*)$', '\\1') or [''])[0] }}"
        do_spaces_access_key: "{{ (env_content_raw | regex_search('(?m)^DO_SPACES_ACCESS_KEY=(.*)$', '\\1') or [''])[0] }}"
        do_spaces_secret_key: "{{ (env_content_raw | regex_search('(?m)^DO_SPACES_SECRET_KEY=(.*)$', '\\1') or [''])[0] }}"
        juicefs_bucket: "{{ (env_content_raw | regex_search('(?m)^JUICEFS_BUCKET=(.*)$', '\\1') or [''])[0] }}"
        juicefs_meta_url: "{{ (env_content_raw | regex_search('(?m)^JUICEFS_META_URL=(.*)$', '\\1') or [''])[0] }}"
        github_app_id: "{{ (env_content_raw | regex_search('(?m)^GITHUB_APP_ID=(.*)$', '\\1') or [''])[0] }}"
        github_app_private_key_b64: "{{ (env_content_raw | regex_search('(?m)^GITHUB_APP_PRIVATE_KEY_B64=(.*)$', '\\1') or [''])[0] }}"
        github_installation_id: "{{ (env_content_raw | regex_search('(?m)^GITHUB_INSTALLATION_ID=(.*)$', '\\1') or [''])[0] }}"
        kata_vm_cpus: "{{ (env_content_raw | regex_search('(?m)^KATA_VM_CPUS=(.*)$', '\\1') or ['4'])[0] }}"
        kata_vm_memory_mb: "{{ (env_content_raw | regex_search('(?m)^KATA_VM_MEMORY_MB=(.*)$', '\\1') or ['4096'])[0] }}"
        github_token: "{{ (env_content_raw | regex_search('(?m)^GITHUB_TOKEN=(.*)$', '\\1') or [''])[0] }}"
        github_copilot_token: "{{ (env_content_raw | regex_search('(?m)^GITHUB_COPILOT_TOKEN=(.*)$', '\\1') or [''])[0] }}"
        openai_api_key: "{{ (env_content_raw | regex_search('(?m)^OPENAI_API_KEY=(.*)$', '\\1') or [''])[0] }}"
        codex_access_token: "{{ (env_content_raw | regex_search('(?m)^CODEX_ACCESS_TOKEN=(.*)$', '\\1') or [''])[0] }}"
        codex_id_token: "{{ (env_content_raw | regex_search('(?m)^CODEX_ID_TOKEN=(.*)$', '\\1') or [''])[0] }}"
        codex_refresh_token: "{{ (env_content_raw | regex_search('(?m)^CODEX_REFRESH_TOKEN=(.*)$', '\\1') or [''])[0] }}"
        mistral_api_key: "{{ (env_content_raw | regex_search('(?m)^MISTRAL_API_KEY=(.*)$', '\\1') or [''])[0] }}"
        opencode_api_key: "{{ (env_content_raw | regex_search('(?m)^OPENCODE_API_KEY=(.*)$', '\\1') or [''])[0] }}"
        zai_api_key: "{{ (env_content_raw | regex_search('(?m)^ZAI_API_KEY=(.*)$', '\\1') or [''])[0] }}"
        github_copilot_oauth_access_token: "{{ (env_content_raw | regex_search('(?m)^GITHUB_COPILOT_OAUTH_ACCESS_TOKEN=(.*)$', '\\1') or [''])[0] }}"
        github_copilot_oauth_refresh_token: "{{ (env_content_raw | regex_search('(?m)^GITHUB_COPILOT_OAUTH_REFRESH_TOKEN=(.*)$', '\\1') or [''])[0] }}"
        github_copilot_oauth_token_expires: "{{ (env_content_raw | regex_search('(?m)^GITHUB_COPILOT_OAUTH_TOKEN_EXPIRES=(.*)$', '\\1') or ['0'])[0] }}"
        github_webhook_secret: "{{ (env_content_raw | regex_search('(?m)^GITHUB_WEBHOOK_SECRET=(.*)$', '\\1') or [''])[0] }}"
        max_active_sessions: "{{ (env_content_raw | regex_search('(?m)^MAX_ACTIVE_SESSIONS=(.*)$', '\\1') or ['5'])[0] }}"
        max_concurrent_github_sessions: "{{ (env_content_raw | regex_search('(?m)^MAX_CONCURRENT_GITHUB_SESSIONS=(.*)$', '\\1') or ['5'])[0] }}"
        idle_timeout_minutes: "{{ (env_content_raw | regex_search('(?m)^IDLE_TIMEOUT_MINUTES=(.*)$', '\\1') or ['0'])[0] }}"
        dd_api_key: "{{ (env_content_raw | regex_search('(?m)^DD_API_KEY=(.*)$', '\\1') or [''])[0] }}"
        dd_app_key: "{{ (env_content_raw | regex_search('(?m)^DD_APP_KEY=(.*)$', '\\1') or [''])[0] }}"
        dd_site: "{{ (env_content_raw | regex_search('(?m)^DD_SITE=(.*)$', '\\1') or ['datadoghq.com'])[0] }}"

    - name: Verify at least one LLM provider key is configured
      ansible.builtin.assert:
        that:
          - anthropic_api_key | length > 0 or openai_api_key | length > 0 or mistral_api_key | length > 0 or opencode_api_key | length > 0 or zai_api_key | length > 0 or github_copilot_token | length > 0
        fail_msg: >-
          Netclode requires at least one model provider API key in .env.
          Set one of ANTHROPIC_API_KEY, OPENAI_API_KEY, MISTRAL_API_KEY,
          OPENCODE_API_KEY, ZAI_API_KEY, or GITHUB_COPILOT_TOKEN before deploying workloads.

# Host secrets - skip if only deploying k8s secrets
- name: Deploy host secrets
  when:
    - env_file_stat.stat.exists
    - not (deploy_k8s_secrets | default(false))
  block:
    - name: Create /var/secrets directory
      ansible.builtin.file:
        path: /var/secrets
        state: directory
        mode: "0700"
        owner: root
        group: root

    - name: Deploy SSH authorized keys
      ansible.builtin.copy:
        content: "{{ ssh_keys }}"
        dest: /var/secrets/ssh-authorized-keys
        mode: "0600"
        owner: root
        group: root
      when: ssh_keys | length > 0

    - name: Deploy Tailscale OAuth client ID
      ansible.builtin.copy:
        content: "{{ ts_oauth_client_id }}"
        dest: /var/secrets/ts-oauth-client-id
        mode: "0600"
        owner: root
        group: root
      when: ts_oauth_client_id | length > 0

    - name: Deploy Tailscale OAuth client secret
      ansible.builtin.copy:
        content: "{{ ts_oauth_client_secret }}"
        dest: /var/secrets/ts-oauth-client-secret
        mode: "0600"
        owner: root
        group: root
      when: ts_oauth_client_secret | length > 0

    - name: Deploy Tailscale auth key
      ansible.builtin.copy:
        content: "{{ tailscale_authkey }}"
        dest: /var/secrets/tailscale-authkey
        mode: "0600"
        owner: root
        group: root
      when: tailscale_authkey | length > 0

# K8s secrets - only after namespace exists
- name: Deploy Kubernetes secrets
  when:
    - env_file_stat.stat.exists
    - deploy_k8s_secrets | default(false)
  block:
    # Build secrets.json for secret-proxy (simple secretKey -> secretValue mapping)
    # Control-plane tells the proxy which key to use, proxy looks up the value
    - name: Build proxy secrets dict
      ansible.builtin.set_fact:
        proxy_secrets_dict: >-
          {{
            {}
            | combine({'anthropic': anthropic_api_key} if anthropic_api_key | length > 0 else {})
            | combine({'openai': openai_api_key} if openai_api_key | length > 0 else {})
            | combine({'mistral': mistral_api_key} if mistral_api_key | length > 0 else {})
            | combine({'opencode': opencode_api_key} if opencode_api_key | length > 0 else {})
            | combine({'zai': zai_api_key} if zai_api_key | length > 0 else {})
            | combine({'github_copilot': github_copilot_token} if github_copilot_token | length > 0 else {})
            | combine({'codex_access': codex_access_token} if codex_access_token | length > 0 else {})
            | combine({'codex_id': codex_id_token} if codex_id_token | length > 0 else {})
            | combine({'codex_refresh': codex_refresh_token} if codex_refresh_token | length > 0 else {})
          }}

    # Create secret-proxy-secrets for the proxy (contains real API keys)
    # This secret is mounted ONLY in the secret-proxy pod, NOT in sandboxes
    - name: Create secret-proxy-secrets Kubernetes secret
      kubernetes.core.k8s:
        state: present
        kubeconfig: "{{ k3s_kubeconfig }}"
        definition:
          apiVersion: v1
          kind: Secret
          metadata:
            name: secret-proxy-secrets
            namespace: netclode
          type: Opaque
          stringData:
            secrets.json: "{{ proxy_secrets_dict | to_json }}"

    - name: Create netclode-secrets Kubernetes secret
      kubernetes.core.k8s:
        state: present
        kubeconfig: "{{ k3s_kubeconfig }}"
        definition:
          apiVersion: v1
          kind: Secret
          metadata:
            name: netclode-secrets
            namespace: netclode
          type: Opaque
          stringData:
            # Real API keys for control-plane (used for model listing, quota checks, etc.)
            anthropic-api-key: "{{ anthropic_api_key }}"
            openai-api-key: "{{ openai_api_key }}"
            mistral-api-key: "{{ mistral_api_key }}"
            opencode-api-key: "{{ opencode_api_key }}"
            zai-api-key: "{{ zai_api_key }}"
            github-copilot-token: "{{ github_copilot_token }}"
            codex-access-token: "{{ codex_access_token }}"
            codex-id-token: "{{ codex_id_token }}"
            codex-refresh-token: "{{ codex_refresh_token }}"
            # Placeholders for sandbox (agent sees these, proxy replaces them)
            anthropic-api-key-placeholder: "NETCLODE_PLACEHOLDER_anthropic"
            openai-api-key-placeholder: "NETCLODE_PLACEHOLDER_openai"
            mistral-api-key-placeholder: "NETCLODE_PLACEHOLDER_mistral"
            opencode-api-key-placeholder: "NETCLODE_PLACEHOLDER_opencode"
            zai-api-key-placeholder: "NETCLODE_PLACEHOLDER_zai"
            github-copilot-token-placeholder: "NETCLODE_PLACEHOLDER_github_copilot"
            codex-access-token-placeholder: "NETCLODE_PLACEHOLDER_codex_access"
            codex-id-token-placeholder: "NETCLODE_PLACEHOLDER_codex_id"
            codex-refresh-token-placeholder: "NETCLODE_PLACEHOLDER_codex_refresh"
            # GitHub Copilot OAuth tokens (for OpenCode provider; obtained via device-flow)
            # These are NOT proxied — injected directly into sandbox env by control-plane
            github-copilot-oauth-access-token: "{{ github_copilot_oauth_access_token }}"
            github-copilot-oauth-refresh-token: "{{ github_copilot_oauth_refresh_token }}"
            github-copilot-oauth-token-expires: "{{ github_copilot_oauth_token_expires }}"
            # Non-proxied secrets (used directly, not through proxy)
            # GITHUB_TOKEN is for git operations (clone/push) - uses credential helper, not HTTP headers
            github-token: "{{ github_token }}"
            # Control-plane GitHub App integration
            github-app-id: "{{ github_app_id }}"
            github-app-private-key: "{{ github_app_private_key_b64 | b64decode }}"
            github-installation-id: "{{ github_installation_id }}"
            # GitHub webhook secret for github-bot
            github-webhook-secret: "{{ github_webhook_secret }}"
            tailscale-authkey: "{{ tailscale_authkey }}"

    - name: Check if juicefs-secret already exists
      kubernetes.core.k8s_info:
        api_version: v1
        kind: Secret
        name: juicefs-secret
        namespace: netclode
        kubeconfig: "{{ k3s_kubeconfig }}"
      register: existing_juicefs_secret

    - name: Generate JuiceFS volume name with random suffix
      ansible.builtin.set_fact:
        juicefs_volume_name: "netclode-{{ lookup('password', '/dev/null chars=ascii_lowercase,digits length=6') }}"
      when:
        - existing_juicefs_secret.resources | length == 0
        - do_spaces_access_key | length > 0

    - name: Use existing JuiceFS volume name
      ansible.builtin.set_fact:
        juicefs_volume_name: "{{ (existing_juicefs_secret.resources[0].data.name | b64decode) }}"
      when:
        - existing_juicefs_secret.resources | length > 0

    - name: Create juicefs-secret Kubernetes secret
      kubernetes.core.k8s:
        state: present
        kubeconfig: "{{ k3s_kubeconfig }}"
        definition:
          apiVersion: v1
          kind: Secret
          metadata:
            name: juicefs-secret
            namespace: netclode
          type: Opaque
          stringData:
            name: "{{ juicefs_volume_name }}"
            metaurl: "{{ juicefs_meta_url }}"
            storage: s3
            bucket: "{{ juicefs_bucket }}"
            access-key: "{{ do_spaces_access_key }}"
            secret-key: "{{ do_spaces_secret_key }}"
      when: do_spaces_access_key | length > 0
