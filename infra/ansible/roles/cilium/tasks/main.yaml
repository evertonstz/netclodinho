---
# Cilium CNI role - installs Cilium for NetworkPolicy support
# Replaces Flannel (k3s must be started with --flannel-backend=none)

- name: Add Cilium Helm repository
  kubernetes.core.helm_repository:
    name: cilium
    repo_url: https://helm.cilium.io/
    kubeconfig: "{{ k3s_kubeconfig }}"

- name: Check if Cilium is already installed
  kubernetes.core.helm_info:
    name: cilium
    release_namespace: kube-system
    kubeconfig: "{{ k3s_kubeconfig }}"
  register: cilium_release
  ignore_errors: yes

- name: Install Cilium
  kubernetes.core.helm:
    name: cilium
    chart_ref: cilium/cilium
    chart_version: "{{ cilium_version }}"
    release_namespace: kube-system
    create_namespace: yes
    kubeconfig: "{{ k3s_kubeconfig }}"
    values:
      # k3s-specific settings
      operator:
        replicas: 1
      # Use kube-proxy replacement for better performance
      kubeProxyReplacement: "true"
      k8sServiceHost: "127.0.0.1"
      k8sServicePort: "6443"
      # Enable Hubble for observability (optional but useful)
      hubble:
        enabled: true
        relay:
          enabled: true
        ui:
          enabled: false  # Can enable later if needed
      # Policy enforcement
      policyEnforcementMode: "default"
      # IPAM mode
      ipam:
        mode: "kubernetes"
  when: cilium_release.status is not defined or cilium_release.status.status != "deployed"

- name: Wait for Cilium to be ready
  ansible.builtin.shell: |
    export KUBECONFIG={{ k3s_kubeconfig }}
    kubectl -n kube-system wait --for=condition=Ready pod -l app.kubernetes.io/name=cilium-agent --timeout=300s
  register: cilium_ready
  retries: 5
  delay: 15
  until: cilium_ready.rc == 0
  changed_when: false

- name: Verify Cilium status
  ansible.builtin.shell: |
    export KUBECONFIG={{ k3s_kubeconfig }}
    kubectl -n kube-system get pods -l app.kubernetes.io/part-of=cilium -o wide
  register: cilium_pods
  changed_when: false

- name: Display Cilium pods
  ansible.builtin.debug:
    var: cilium_pods.stdout_lines
