---
# JuiceFS CSI Driver role
# Ported from NixOS modules/juicefs-csi.nix

- name: Check if JuiceFS CSI is deployed
  kubernetes.core.k8s_info:
    api_version: apps/v1
    kind: StatefulSet
    name: juicefs-csi-controller
    namespace: kube-system
    kubeconfig: "{{ k3s_kubeconfig }}"
  register: juicefs_csi_sts
  failed_when: false

- name: Deploy JuiceFS CSI driver
  kubernetes.core.k8s:
    state: present
    src: "https://raw.githubusercontent.com/juicedata/juicefs-csi-driver/{{ juicefs_csi_version }}/deploy/k8s.yaml"
    kubeconfig: "{{ k3s_kubeconfig }}"
  when: juicefs_csi_sts.resources | default([]) | length == 0

- name: Scale JuiceFS CSI controller to 1 replica (single-node cluster)
  kubernetes.core.k8s:
    api_version: apps/v1
    kind: StatefulSet
    name: juicefs-csi-controller
    namespace: kube-system
    kubeconfig: "{{ k3s_kubeconfig }}"
    state: present
    definition:
      spec:
        replicas: 1

- name: Wait for JuiceFS CSI controller to be ready
  kubernetes.core.k8s_info:
    api_version: apps/v1
    kind: StatefulSet
    name: juicefs-csi-controller
    namespace: kube-system
    kubeconfig: "{{ k3s_kubeconfig }}"
  register: juicefs_csi_status
  until: (juicefs_csi_status.resources[0].status.readyReplicas | default(0)) >= 1
  retries: 30
  delay: 10

# Add csi-snapshotter sidecar to enable VolumeSnapshot support
- name: Patch JuiceFS CSI controller to add csi-snapshotter sidecar
  kubernetes.core.k8s_json_patch:
    api_version: apps/v1
    kind: StatefulSet
    name: juicefs-csi-controller
    namespace: kube-system
    kubeconfig: "{{ k3s_kubeconfig }}"
    patch:
      - op: add
        path: /spec/template/spec/containers/-
        value:
          name: csi-snapshotter
          image: "registry.k8s.io/sig-storage/csi-snapshotter:v8.2.0"
          args:
            - "--csi-address=$(ADDRESS)"
            - "--leader-election"
            - "--leader-election-namespace=kube-system"
            - "--v=2"
          env:
            - name: ADDRESS
              value: /var/lib/csi/sockets/pluginproxy/csi.sock
          volumeMounts:
            - name: socket-dir
              mountPath: /var/lib/csi/sockets/pluginproxy/
  register: snapshotter_patch
  failed_when: false  # May fail if already patched

- name: Restart JuiceFS CSI controller if patched
  kubernetes.core.k8s:
    api_version: apps/v1
    kind: StatefulSet
    name: juicefs-csi-controller
    namespace: kube-system
    kubeconfig: "{{ k3s_kubeconfig }}"
    state: present
    definition:
      spec:
        template:
          metadata:
            annotations:
              kubectl.kubernetes.io/restartedAt: "{{ ansible_date_time.iso8601 }}"
  when: snapshotter_patch.changed | default(false)

# VolumeSnapshot support for session history restore
- name: Install VolumeSnapshot CRDs
  kubernetes.core.k8s:
    state: present
    src: "https://raw.githubusercontent.com/kubernetes-csi/external-snapshotter/{{ snapshot_controller_version }}/client/config/crd/snapshot.storage.k8s.io_volumesnapshotclasses.yaml"
    kubeconfig: "{{ k3s_kubeconfig }}"

- name: Install VolumeSnapshotContent CRD
  kubernetes.core.k8s:
    state: present
    src: "https://raw.githubusercontent.com/kubernetes-csi/external-snapshotter/{{ snapshot_controller_version }}/client/config/crd/snapshot.storage.k8s.io_volumesnapshotcontents.yaml"
    kubeconfig: "{{ k3s_kubeconfig }}"

- name: Install VolumeSnapshot CRD
  kubernetes.core.k8s:
    state: present
    src: "https://raw.githubusercontent.com/kubernetes-csi/external-snapshotter/{{ snapshot_controller_version }}/client/config/crd/snapshot.storage.k8s.io_volumesnapshots.yaml"
    kubeconfig: "{{ k3s_kubeconfig }}"

- name: Install snapshot-controller RBAC
  kubernetes.core.k8s:
    state: present
    src: "https://raw.githubusercontent.com/kubernetes-csi/external-snapshotter/{{ snapshot_controller_version }}/deploy/kubernetes/snapshot-controller/rbac-snapshot-controller.yaml"
    kubeconfig: "{{ k3s_kubeconfig }}"

- name: Install snapshot-controller deployment
  kubernetes.core.k8s:
    state: present
    src: "https://raw.githubusercontent.com/kubernetes-csi/external-snapshotter/{{ snapshot_controller_version }}/deploy/kubernetes/snapshot-controller/setup-snapshot-controller.yaml"
    kubeconfig: "{{ k3s_kubeconfig }}"

- name: Create JuiceFS VolumeSnapshotClass
  kubernetes.core.k8s:
    state: present
    kubeconfig: "{{ k3s_kubeconfig }}"
    definition:
      apiVersion: snapshot.storage.k8s.io/v1
      kind: VolumeSnapshotClass
      metadata:
        name: juicefs-snapclass
      driver: csi.juicefs.com
      deletionPolicy: Delete
      parameters:
        csi.storage.k8s.io/snapshotter-secret-name: juicefs-secret
        csi.storage.k8s.io/snapshotter-secret-namespace: netclode

# RBAC for JuiceFS CSI to read VolumeSnapshots (needed for restore from snapshot)
- name: Create JuiceFS CSI snapshot reader ClusterRole
  kubernetes.core.k8s:
    state: present
    kubeconfig: "{{ k3s_kubeconfig }}"
    definition:
      apiVersion: rbac.authorization.k8s.io/v1
      kind: ClusterRole
      metadata:
        name: juicefs-csi-snapshot-reader
      rules:
        - apiGroups: ["snapshot.storage.k8s.io"]
          resources: ["volumesnapshots", "volumesnapshotcontents"]
          verbs: ["get", "list", "watch"]

- name: Bind JuiceFS CSI snapshot reader ClusterRole
  kubernetes.core.k8s:
    state: present
    kubeconfig: "{{ k3s_kubeconfig }}"
    definition:
      apiVersion: rbac.authorization.k8s.io/v1
      kind: ClusterRoleBinding
      metadata:
        name: juicefs-csi-snapshot-reader
      subjects:
        - kind: ServiceAccount
          name: juicefs-csi-controller-sa
          namespace: kube-system
      roleRef:
        kind: ClusterRole
        name: juicefs-csi-snapshot-reader
        apiGroup: rbac.authorization.k8s.io
