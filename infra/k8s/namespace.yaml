# Netclode namespace and RBAC
---
apiVersion: v1
kind: Namespace
metadata:
  name: netclode
  labels:
    app.kubernetes.io/name: netclode
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: control-plane
  namespace: netclode
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: sandbox-manager
  namespace: netclode
rules:
  # Sandbox CRDs
  - apiGroups: ["agents.x-k8s.io"]
    resources: ["sandboxes", "sandboxes/status"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Extension CRDs
  - apiGroups: ["extensions.agents.x-k8s.io"]
    resources: ["sandboxclaims", "sandboxclaims/status", "sandboxtemplates"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Core resources
  - apiGroups: [""]
    resources: ["pods", "pods/log"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["get", "list", "watch", "create", "update", "delete"]
  # NetworkPolicy for dynamic port exposure and network access control
  - apiGroups: ["networking.k8s.io"]
    resources: ["networkpolicies"]
    verbs: ["get", "list", "watch", "create", "update", "delete"]
  - apiGroups: [""]
    resources: ["persistentvolumeclaims"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "watch", "create", "delete"]
  # VolumeSnapshots for session history restore
  - apiGroups: ["snapshot.storage.k8s.io"]
    resources: ["volumesnapshots"]
    verbs: ["get", "list", "watch", "create", "delete"]
  # ConfigMaps for session anchors (prevent PVC GC during pause)
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch", "create", "update", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: sandbox-manager-binding
  namespace: netclode
subjects:
  - kind: ServiceAccount
    name: control-plane
    namespace: netclode
roleRef:
  kind: Role
  name: sandbox-manager
  apiGroup: rbac.authorization.k8s.io
---
# ClusterRole to read JuiceFS restore jobs in kube-system
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: juicefs-restore-job-reader
rules:
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: control-plane-juicefs-restore
subjects:
  - kind: ServiceAccount
    name: control-plane
    namespace: netclode
roleRef:
  kind: ClusterRole
  name: juicefs-restore-job-reader
  apiGroup: rbac.authorization.k8s.io
