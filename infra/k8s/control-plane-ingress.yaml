# Tailscale Ingress for control-plane (HTTPS with Connect RPC support)
# Uses custom proxy image (ghcr.io/angristan/tailscale:connect-fix) with h2c support
# for Connect protocol content types (application/connect+proto, application/connect+json)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: control-plane
  namespace: netclode
  annotations:
    tailscale.com/https: "true"
spec:
  ingressClassName: tailscale
  defaultBackend:
    service:
      name: control-plane
      port:
        number: 80
