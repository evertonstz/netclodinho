# Redis for session storage (separate from JuiceFS metadata)
# Stores: sessions, chat messages, events
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: redis-sessions-data
  namespace: netclode
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-path
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis-sessions
  namespace: netclode
  labels:
    app: redis-sessions
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis-sessions
  template:
    metadata:
      labels:
        app: redis-sessions
    spec:
      priorityClassName: netclode-infrastructure
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
          args:
            - redis-server
            - --appendonly
            - "yes"
            - --appendfsync
            - everysec
            - --maxmemory
            - 128mb
            - --maxmemory-policy
            - allkeys-lru
          volumeMounts:
            - name: data
              mountPath: /data
          livenessProbe:
            exec:
              command: [redis-cli, ping]
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            exec:
              command: [redis-cli, ping]
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: redis-sessions-data
---
apiVersion: v1
kind: Service
metadata:
  name: redis-sessions
  namespace: netclode
  labels:
    app: redis-sessions
spec:
  selector:
    app: redis-sessions
  ports:
    - port: 6379
      targetPort: 6379
