# SandboxWarmPool for Netclode Agent
#
# Keeps pre-warmed pods with PVCs ready for instant allocation.
# When a SandboxClaim requests this template, it will get an existing warm pod
# instead of waiting for a new one to start.
#
# How it works:
# 1. Controller creates PVC from template's volumeClaimTemplates
# 2. Controller creates Pod referencing the PVC
# 3. Pod starts and becomes Ready
# 4. When SandboxClaim arrives, warm pod is assigned to it
#
# Prerequisites:
# - SandboxTemplate "netclode-agent" must exist
# - StorageClass referenced in template must be available
# - RuntimeClass referenced in template must be available
#
# Note: Uses custom controller with PVC explosion fix (volumeclaim-v6)
# See infra/k8s/README.md for details on the fix.
#
apiVersion: extensions.agents.x-k8s.io/v1alpha1
kind: SandboxWarmPool
metadata:
  name: netclode-agent-pool
  namespace: netclode
spec:
  replicas: 1
  sandboxTemplateRef:
    name: netclode-agent
