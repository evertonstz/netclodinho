# Agent Sandbox Controller
#
# Custom build from: github.com/angristan/agent-sandbox (fork of kubernetes-sigs/agent-sandbox)
#
# Custom features in this image:
# - volumeClaimTemplates support in SandboxTemplate for persistent storage
# - Fix for PVC explosion bug in SandboxWarmPool (see infra/k8s/README.md)
# - PVC adoption: when adopting warm pool pod, adopts its PVCs instead of creating new ones
#
# Source: /Users/stanislas/lab/agent-sandbox
# Build: docker build --platform linux/amd64 -t ghcr.io/angristan/agent-sandbox-controller:volumeclaim-v8 .
#
---
kind: StatefulSet
apiVersion: apps/v1
metadata:
  name: agent-sandbox-controller
  namespace: agent-sandbox-system
  labels:
    app: agent-sandbox-controller
spec:
  serviceName: agent-sandbox-controller
  replicas: 1
  selector:
    matchLabels:
      app: agent-sandbox-controller
  template:
    metadata:
      labels:
        app: agent-sandbox-controller
    spec:
      serviceAccountName: agent-sandbox-controller
      containers:
      - name: agent-sandbox-controller
        image: ghcr.io/angristan/agent-sandbox-controller:volumeclaim-v8
        imagePullPolicy: Always
        args:
        - "--extensions"
