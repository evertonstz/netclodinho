# Control Plane Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: control-plane
  namespace: netclode
  labels:
    app: control-plane
spec:
  replicas: 1
  selector:
    matchLabels:
      app: control-plane
  template:
    metadata:
      labels:
        app: control-plane
    spec:
      serviceAccountName: control-plane
      containers:
        - name: control-plane
          image: ghcr.io/angristan/netclode-control-plane:latest
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "3000"
            - name: NODE_TLS_REJECT_UNAUTHORIZED
              value: "0"  # Required for bun + k8s client in-cluster
            - name: K8S_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: netclode-secrets
                  key: anthropic-api-key
            - name: REDIS_URL
              value: "redis://redis-sessions.netclode.svc.cluster.local:6379"
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 20
---
# Control Plane Service with Tailscale exposure
apiVersion: v1
kind: Service
metadata:
  name: control-plane
  namespace: netclode
  annotations:
    tailscale.com/expose: "true"
    tailscale.com/hostname: "netclode"
  labels:
    app: control-plane
spec:
  type: ClusterIP
  selector:
    app: control-plane
  ports:
    - port: 80
      targetPort: 3000
      name: http
# Secret 'netclode-secrets' is created by scripts/deploy-secrets.sh
