# Control Plane Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: control-plane
  namespace: netclode
  labels:
    app: control-plane
spec:
  replicas: 1
  selector:
    matchLabels:
      app: control-plane
  template:
    metadata:
      labels:
        app: control-plane
    spec:
      serviceAccountName: control-plane
      containers:
        - name: control-plane
          image: ghcr.io/angristan/netclode-control-plane:latest
          ports:
            - containerPort: 3000
              name: http
            - containerPort: 3001
              name: connect
          env:
            - name: PORT
              value: "3000"
            - name: CONNECT_PORT
              value: "3001"
            - name: K8S_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: netclode-secrets
                  key: anthropic-api-key
            # GitHub App integration (optional)
            - name: GITHUB_APP_ID
              valueFrom:
                secretKeyRef:
                  name: netclode-secrets
                  key: github-app-id
                  optional: true
            - name: GITHUB_APP_PRIVATE_KEY
              valueFrom:
                secretKeyRef:
                  name: netclode-secrets
                  key: github-app-private-key
                  optional: true
            - name: GITHUB_INSTALLATION_ID
              valueFrom:
                secretKeyRef:
                  name: netclode-secrets
                  key: github-installation-id
                  optional: true
            - name: REDIS_URL
              value: "redis://redis-sessions.netclode.svc.cluster.local:6379"
            - name: WARM_POOL_ENABLED
              value: "true"
            - name: MAX_ACTIVE_SESSIONS
              value: "3"
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 20
---
# Control Plane Service with Tailscale exposure
apiVersion: v1
kind: Service
metadata:
  name: control-plane
  namespace: netclode
  annotations:
    tailscale.com/expose: "true"
    tailscale.com/hostname: "netclode-control-plane"
  labels:
    app: control-plane
spec:
  type: ClusterIP
  selector:
    app: control-plane
  ports:
    - port: 80
      targetPort: 3000
      name: http
    - port: 3001
      targetPort: 3001
      name: connect
# Secret 'netclode-secrets' is created by scripts/deploy-secrets.sh
