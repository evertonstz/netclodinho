# Control Plane Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: control-plane
  namespace: netclode
  labels:
    app: control-plane
spec:
  replicas: 1
  selector:
    matchLabels:
      app: control-plane
  template:
    metadata:
      labels:
        app: control-plane
    spec:
      serviceAccountName: control-plane
      # Init container to set up tsnet state directory permissions
      initContainers:
        - name: init-tailscale-state
          image: busybox:1.36
          command: ['sh', '-c', 'mkdir -p /var/lib/tailscale && chmod 700 /var/lib/tailscale']
          volumeMounts:
            - name: tailscale-state
              mountPath: /var/lib/tailscale
      containers:
        - name: control-plane
          image: ghcr.io/angristan/netclode-control-plane:latest
          securityContext:
            runAsUser: 0  # tsnet needs to manage its state directory
          ports:
            - containerPort: 3000
              name: http
            - containerPort: 443
              name: connect-tls
          env:
            - name: PORT
              value: "3000"
            - name: CONNECT_PORT
              value: "3001"  # Only used if TS_AUTHKEY is not set (h2c mode)
            - name: K8S_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: netclode-secrets
                  key: anthropic-api-key
            # GitHub App integration (optional)
            - name: GITHUB_APP_ID
              valueFrom:
                secretKeyRef:
                  name: netclode-secrets
                  key: github-app-id
                  optional: true
            - name: GITHUB_APP_PRIVATE_KEY
              valueFrom:
                secretKeyRef:
                  name: netclode-secrets
                  key: github-app-private-key
                  optional: true
            - name: GITHUB_INSTALLATION_ID
              valueFrom:
                secretKeyRef:
                  name: netclode-secrets
                  key: github-installation-id
                  optional: true
            - name: REDIS_URL
              value: "redis://redis-sessions.netclode.svc.cluster.local:6379"
            - name: WARM_POOL_ENABLED
              value: "true"
            - name: MAX_ACTIVE_SESSIONS
              value: "3"
            # Tailscale tsnet integration for HTTPS Connect endpoint
            - name: TS_AUTHKEY
              valueFrom:
                secretKeyRef:
                  name: netclode-secrets
                  key: tailscale-authkey
                  optional: true
            - name: TS_HOSTNAME
              value: "netclode-control-plane"
            - name: TS_STATE_DIR
              value: "/var/lib/tailscale"
          volumeMounts:
            - name: tailscale-state
              mountPath: /var/lib/tailscale
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 20
      volumes:
        - name: tailscale-state
          persistentVolumeClaim:
            claimName: control-plane-tailscale-state
---
# PVC for Tailscale tsnet state (persists auth between restarts)
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: control-plane-tailscale-state
  namespace: netclode
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 100Mi
---
# Control Plane Service (internal only - Connect endpoint uses tsnet directly)
apiVersion: v1
kind: Service
metadata:
  name: control-plane
  namespace: netclode
  labels:
    app: control-plane
spec:
  type: ClusterIP
  selector:
    app: control-plane
  ports:
    - port: 80
      targetPort: 3000
      name: http
# Note: The Connect endpoint (port 443) is exposed directly via Tailscale tsnet,
# not through this Kubernetes service. iOS clients connect to:
# https://netclode-control-plane.YOUR-TAILNET.ts.net
