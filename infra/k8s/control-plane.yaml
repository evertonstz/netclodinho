# Control Plane Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: control-plane
  namespace: netclode
  labels:
    app: control-plane
spec:
  replicas: 1
  selector:
    matchLabels:
      app: control-plane
  template:
    metadata:
      labels:
        app: control-plane
    spec:
      serviceAccountName: control-plane
      containers:
        - name: control-plane
          image: ghcr.io/angristan/netclode-control-plane:latest
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: PORT
              value: "3000"
            - name: K8S_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: netclode-secrets
                  key: anthropic-api-key
            # GitHub token for Copilot SDK (optional)
            - name: GITHUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: netclode-secrets
                  key: github-token
                  optional: true
            # GitHub App integration (optional)
            - name: GITHUB_APP_ID
              valueFrom:
                secretKeyRef:
                  name: netclode-secrets
                  key: github-app-id
                  optional: true
            - name: GITHUB_APP_PRIVATE_KEY
              valueFrom:
                secretKeyRef:
                  name: netclode-secrets
                  key: github-app-private-key
                  optional: true
            - name: GITHUB_INSTALLATION_ID
              valueFrom:
                secretKeyRef:
                  name: netclode-secrets
                  key: github-installation-id
                  optional: true
            - name: REDIS_URL
              value: "redis://redis-sessions.netclode.svc.cluster.local:6379"
            - name: WARM_POOL_ENABLED
              value: "true"
            - name: MAX_ACTIVE_SESSIONS
              value: "3"
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 20
---
# Control Plane Service
apiVersion: v1
kind: Service
metadata:
  name: control-plane
  namespace: netclode
  labels:
    app: control-plane
spec:
  type: ClusterIP
  selector:
    app: control-plane
  ports:
    - port: 80
      targetPort: 3000
      name: http
# Note: iOS clients connect via Tailscale Ingress (see control-plane-ingress.yaml)
# Internal agents connect via h2c on this service (port 80)
