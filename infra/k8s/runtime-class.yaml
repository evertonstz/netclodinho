# RuntimeClass for Kata Containers with Cloud Hypervisor
# Overhead accounts for host-side processes: VMM, vhost, virtiofsd, kata-shim
# These run in the pod cgroup when sandbox_cgroup_only=true
apiVersion: node.k8s.io/v1
kind: RuntimeClass
metadata:
  name: kata-clh
handler: kata-clh
overhead:
  podFixed:
    cpu: "500m"
    memory: "512Mi"
