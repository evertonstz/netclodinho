# Web App Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  namespace: netclode
  labels:
    app: web
spec:
  replicas: 1
  selector:
    matchLabels:
      app: web
  template:
    metadata:
      labels:
        app: web
    spec:
      containers:
        - name: web
          image: ghcr.io/angristan/netclode-web:latest
          ports:
            - containerPort: 80
              name: http
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 20
---
# Web App Service with Tailscale exposure
apiVersion: v1
kind: Service
metadata:
  name: web
  namespace: netclode
  annotations:
    tailscale.com/expose: "true"
    tailscale.com/hostname: "netclode-web"
  labels:
    app: web
spec:
  type: ClusterIP
  selector:
    app: web
  ports:
    - port: 80
      targetPort: 80
      name: http
